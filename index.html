<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <!-- Link CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Link Script JS -->
    <script src="js/scripts.js" defer></script>
    <!-- CDN FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <h1>Nicollas Gomes</h1>
    <div id="calculator">
      <input type="text" disabled id="display" value="0"/>
      <div id="box-buttons">
        <button id="clear" onclick="clearAll()">C</button>
        <button id="delete" class="operator" onclick="deleteLast()">
          <i class="fa-solid fa-delete-left"></i>
        </button>
        <button class="operator" onclick="insertToDisplay('/')">
          <i class="fa-solid fa-divide"></i>
        </button>
        <button class="operator" onclick="insertToDisplay('*')">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <button onclick="insertToDisplay('7')">7</button>
        <button onclick="insertToDisplay('8')">8</button>
        <button onclick="insertToDisplay('9')">9</button>
        <button class="operator" onclick="insertToDisplay('-')">
          <i class="fa-solid fa-minus"></i>
        </button>
        <button onclick="insertToDisplay('4')">4</button>
        <button onclick="insertToDisplay('5')">5</button>
        <button onclick="insertToDisplay('6')">6</button>
        <button class="operator" onclick="insertToDisplay('+')">
          <i class="fa-solid fa-plus"></i>
        </button>
        <button onclick="insertToDisplay('1')">1</button>
        <button onclick="insertToDisplay('2')">2</button>
        <button onclick="insertToDisplay('3')">3</button>
        <button id="zero" onclick="insertToDisplay('0')">0</button>
        <button onclick="insertToDisplay('.')">.</button>
        <button id="equal" onclick="calculateResult()"><i class="fa-solid fa-equals"></i></button>
      </div>
    </div>
  </body>
</html>
